<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador Vanti Listo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <main class="shell">
    <aside class="left">
      <p class="mini">Techred · Vanti Listo</p>
      <h1>Generador de documentos</h1>
      <p>Selecciona el formato, diligencia los campos y descarga el PDF.</p>

      <div class="creator">
        <span>CREADO POR</span>
        <strong>ESTEBAN CASTILLO</strong>
      </div>
    </aside>

    <section class="right">
      <div class="cards">
        <button class="doc-btn active" data-doc="acta-entrega">Acta de Entrega VANTI</button>
        <button class="doc-btn" data-doc="orden-pedido">Orden de pedido</button>
        <button class="doc-btn" data-doc="cambio-producto">Formato de cambio de producto</button>
      </div>

      <div id="form-zone"></div>
    </section>
  </main>
  <script src="/static/js/app.js"></script>
</body>
</html>
