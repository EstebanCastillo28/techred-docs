<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generador de Documentos · Vanti Listo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css"/>
</head>
<body>
<main class="shell">
  <!-- ── SIDEBAR ── -->
  <aside class="left">
    <div class="logo-badge">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none" aria-label="Techred logo">
        <rect width="38" height="38" rx="10" fill="#e83030"/>
        <text x="7" y="26" font-family="Georgia,serif" font-weight="700" font-size="18" fill="white">T</text>
        <line x1="22" y1="9" x2="22" y2="29" stroke="white" stroke-width="2.5"/>
        <line x1="24" y1="19" x2="32" y2="29" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="24" y1="19" x2="32" y2="9" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <div class="logo-text">TECH<span>RED</span></div>
    </div>

    <div>
      <p class="mini">Vanti Listo · Documentos</p>
      <h1>Generador de documentos</h1>
      <p class="subtitle">Selecciona el formato, completa los campos y descarga el PDF listo para imprimir.</p>
    </div>

    <div class="divider"></div>
    <div class="creator">
      <span>Creado por</span>
      <strong>ESTEBAN CASTILLO</strong>
    </div>
  </aside>

  <!-- ── PANEL PRINCIPAL ── -->
  <section class="right">
    <div class="cards">
      <button class="doc-btn active" data-doc="acta-entrega">Acta de Entrega VANTI</button>
      <button class="doc-btn"        data-doc="orden-pedido">Orden de pedido</button>
      <button class="doc-btn"        data-doc="cambio-producto">Formato de cambio de producto</button>
    </div>

    <div id="form-zone"></div>
  </section>
</main>

<div class="toast" id="toast">✓ PDF generado — descargando…</div>
<script src="/static/js/app.js"></script>
</body>
</html>
