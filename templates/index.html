<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Documentos · Techred</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f4f5;
      --surface: #ffffff;
      --surface2: #f9f9f9;
      --border: #e4e4e7;
      --text: #18181b;
      --muted: #71717a;
      --primary: #cc0000;
      --primary-hover: #a80000;
      --radius: 10px;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    }
    .logo { font-size: 1.3rem; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
    .logo span { color: var(--text); }
    .creator-badge {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 14px;
      letter-spacing: 0.03em;
    }
    .creator-badge strong { color: var(--text); font-weight: 700; }

    main { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }
    .page-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
    .page-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 2rem; }

    /* DOC SELECTOR */
    .doc-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    @media (max-width: 620px) { .doc-cards { grid-template-columns: 1fr; } }
    .doc-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.3rem 1rem 1.1rem;
      cursor: pointer;
      transition: border-color 0.17s, box-shadow 0.17s, background 0.17s;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    }
    .doc-card:hover { border-color: var(--primary); box-shadow: 0 4px 20px rgba(204,0,0,0.10); }
    .doc-card.active { border-color: var(--primary); background: #fff5f5; }
    .doc-card .icon { font-size: 2rem; }
    .doc-card .label { font-size: 0.82rem; font-weight: 600; line-height: 1.35; }
    .doc-card.active .label { color: var(--primary); }

    /* FORM PANEL */
    .form-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem 2rem 2rem;
      box-shadow: var(--shadow);
    }
    .form-panel h2 {
      font-size: 1.05rem; font-weight: 700;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      color: var(--primary);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
    @media (max-width: 620px) { .form-grid { grid-template-columns: 1fr; } }
    .full { grid-column: 1 / -1; }

    .section-title {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--primary);
      margin-top: 0.5rem;
      grid-column: 1 / -1;
      padding-top: 0.5rem;
      border-top: 1px dashed var(--border);
    }
    .section-title:first-child { border-top: none; margin-top: 0; }

    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    label { font-size: 0.73rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    input, select, textarea {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.52rem 0.7rem;
      font-size: 0.88rem;
      font-family: inherit;
      color: var(--text);
      background: var(--surface2);
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(204,0,0,0.08);
    }
    textarea { resize: vertical; min-height: 72px; }

    /* TABLA DE ITEMS */
    .item-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 0.6fr 0.4fr 2fr 1fr 0.6fr 1fr;
      gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    @media (max-width: 700px) { .item-row { grid-template-columns: 1fr 1fr; } }
    .item-row .field label { font-size: 0.65rem; }

    /* SUBMIT */
    .btn-submit {
      margin-top: 1.8rem;
      width: 100%;
      padding: 0.88rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.97rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.17s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      letter-spacing: 0.01em;
    }
    .btn-submit:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { background: #bbb; cursor: not-allowed; transform: none; }
    .spinner {
      display: none; width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text { opacity: 0.75; }

    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: #18181b; color: #fff;
      padding: 0.75rem 1.2rem;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--primary); }
  </style>
</head>
<body>

<header>
  <div class="logo">•TECHRED<span>⇄</span></div>
  <div class="creator-badge">CREADO POR <strong>ESTEBAN CASTILLO</strong></div>
</header>

<main>
  <h1 class="page-title">Generador de Documentos</h1>
  <p class="page-sub">Selecciona el tipo de documento, completa los datos y descarga el PDF.</p>

  <div class="doc-cards">
    <button class="doc-card active" data-doc="acta-entrega">
      <div class="icon">📋</div>
      <div class="label">Acta de Entrega VANTI</div>
    </button>
    <button class="doc-card" data-doc="orden-pedido">
      <div class="icon">🧾</div>
      <div class="label">Orden de Pedido</div>
    </button>
    <button class="doc-card" data-doc="cambio-producto">
      <div class="icon">🔄</div>
      <div class="label">Formato de Cambio de Producto</div>
    </button>
  </div>

  <div class="form-panel">
    <div id="form-zone"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const zone = document.getElementById('form-zone');
const cards = document.querySelectorAll('.doc-card');
const toast = document.getElementById('toast');

function showToast(msg, error = false) {
  toast.textContent = msg;
  toast.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => { toast.className = 'toast'; }, 3500);
}

const FORMS = {
  'acta-entrega': {
    title: 'Acta de Entrega VANTI',
    fields: `
      <p class="section-title">Fecha y consecutivo</p>
      <div class="field"><label>Día</label><input name="dia" placeholder="01" maxlength="2"></div>
      <div class="field"><label>Mes</label><input name="mes" placeholder="Enero"></div>
      <div class="field"><label>Año</label><input name="anio" placeholder="2026" maxlength="4"></div>
      <div class="field"><label>Consecutivo de talonario</label><input name="consecutivo" placeholder="001"></div>
      <p class="section-title">Datos del cliente</p>
      <div class="field full"><label>Nombre completo</label><input name="cliente" placeholder="Nombre del cliente"></div>
      <div class="field"><label>Tipo de documento</label>
        <select name="tipo_doc"><option value="CC">CC</option><option value="CE">CE</option><option value="NIT">NIT</option><option value="PPT">PPT</option></select>
      </div>
      <div class="field"><label>Número de documento</label><input name="cc" placeholder="123456789"></div>
      <div class="field"><label>Cuenta contrato</label><input name="cuenta_contrato" placeholder="Número de cuenta contrato"></div>
      <div class="field full"><label>Dirección de entrega</label><input name="direccion" placeholder="Calle / Carrera / Avenida"></div>
      <p class="section-title">Productos entregados</p>
      <div class="item-row">
        <div class="field"><label>Descripción 1</label><input name="desc_1" placeholder="Producto"></div>
        <div class="field"><label>Cant.</label><input name="cant_1" placeholder="1" type="number" min="0"></div>
        <div class="field"><label>Valor</label><input name="valor_1" placeholder="$ 0"></div>
        <div class="field"><label>Descripción 2</label><input name="desc_2" placeholder="Producto"></div>
        <div class="field"><label>Cant.</label><input name="cant_2" placeholder="1" type="number" min="0"></div>
        <div class="field"><label>Valor</label><input name="valor_2" placeholder="$ 0"></div>
      </div>
      <div class="item-row">
        <div class="field"><label>Descripción 3</label><input name="desc_3" placeholder="Producto"></div>
        <div class="field"><label>Cant.</label><input name="cant_3" placeholder="1" type="number" min="0"></div>
        <div class="field"><label>Valor</label><input name="valor_3" placeholder="$ 0"></div>
      </div>
      <p class="section-title">Quien entrega</p>
      <div class="field"><label>Nombre quien entrega</label><input name="nombre_entrega" placeholder="Nombre"></div>
      <div class="field"><label>C.C. quien entrega</label><input name="cc_entrega" placeholder="123456789"></div>
    `
  },
  'orden-pedido': {
    title: 'Orden de Pedido',
    fields: `
      <p class="section-title">Datos del cliente</p>
      <div class="field full"><label>Cliente</label><input name="cliente" placeholder="Nombre completo"></div>
      <div class="field"><label>C.C.</label><input name="cc" placeholder="123456789"></div>
      <div class="field"><label>Tel / Cel</label><input name="tel" placeholder="3001234567"></div>
      <div class="field full"><label>Dirección</label><input name="direccion" placeholder="Dirección completa"></div>
      <div class="field"><label>Barrio</label><input name="barrio" placeholder="Barrio"></div>
      <div class="field"><label>Ciudad</label><input name="ciudad" placeholder="Bogotá"></div>
      <div class="field"><label>Contacto 1</label><input name="contacto1" placeholder="3001234567"></div>
      <div class="field"><label>Contacto 2</label><input name="contacto2" placeholder="3001234567"></div>
      <div class="field full"><label>Correo</label><input name="correo" type="email" placeholder="correo@ejemplo.com"></div>
      <p class="section-title">Fecha y cuenta contrato</p>
      <div class="field"><label>Día</label><input name="dia" placeholder="01" maxlength="2"></div>
      <div class="field"><label>Mes</label><input name="mes" placeholder="Enero"></div>
      <div class="field"><label>Año</label><input name="anio" placeholder="2026" maxlength="4"></div>
      <div class="field"><label>Cuenta contrato</label><input name="cuenta_contrato" placeholder="Número"></div>
      <p class="section-title">Ítems del pedido</p>
      <div class="item-row">
        <div class="field"><label>REF 1</label><input name="ref_1" placeholder="REF"></div>
        <div class="field"><label>CANT</label><input name="cant_1" placeholder="1"></div>
        <div class="field"><label>DESCRIPCIÓN</label><input name="desc_1" placeholder="Producto"></div>
        <div class="field"><label>VALOR</label><input name="valor_producto_1" placeholder="$ 0"></div>
        <div class="field"><label>CUOTAS</label><input name="cuotas_1" placeholder="12"></div>
        <div class="field"><label>VALOR CUOTA</label><input name="valor_cuotas_1" placeholder="$ 0"></div>
      </div>
      <div class="item-row">
        <div class="field"><label>REF 2</label><input name="ref_2" placeholder="REF"></div>
        <div class="field"><label>CANT</label><input name="cant_2" placeholder="1"></div>
        <div class="field"><label>DESCRIPCIÓN</label><input name="desc_2" placeholder="Producto"></div>
        <div class="field"><label>VALOR</label><input name="valor_producto_2" placeholder="$ 0"></div>
        <div class="field"><label>CUOTAS</label><input name="cuotas_2" placeholder="12"></div>
        <div class="field"><label>VALOR CUOTA</label><input name="valor_cuotas_2" placeholder="$ 0"></div>
      </div>
      <div class="item-row">
        <div class="field"><label>REF 3</label><input name="ref_3" placeholder="REF"></div>
        <div class="field"><label>CANT</label><input name="cant_3" placeholder="1"></div>
        <div class="field"><label>DESCRIPCIÓN</label><input name="desc_3" placeholder="Producto"></div>
        <div class="field"><label>VALOR</label><input name="valor_producto_3" placeholder="$ 0"></div>
        <div class="field"><label>CUOTAS</label><input name="cuotas_3" placeholder="12"></div>
        <div class="field"><label>VALOR CUOTA</label><input name="valor_cuotas_3" placeholder="$ 0"></div>
      </div>
      <div class="item-row">
        <div class="field"><label>REF 4</label><input name="ref_4" placeholder="REF"></div>
        <div class="field"><label>CANT</label><input name="cant_4" placeholder="1"></div>
        <div class="field"><label>DESCRIPCIÓN</label><input name="desc_4" placeholder="Producto"></div>
        <div class="field"><label>VALOR</label><input name="valor_producto_4" placeholder="$ 0"></div>
        <div class="field"><label>CUOTAS</label><input name="cuotas_4" placeholder="12"></div>
        <div class="field"><label>VALOR CUOTA</label><input name="valor_cuotas_4" placeholder="$ 0"></div>
      </div>
      <p class="section-title">Totales y forma de pago</p>
      <div class="field"><label>Valor total compra</label><input name="valor_total" placeholder="$ 0"></div>
      <div class="field"><label>Contraentrega $</label><input name="contraentrega" placeholder="$ 0"></div>
      <div class="field"><label>Forma de pago (otro)</label><input name="forma_pago_otro" placeholder="Especificar"></div>
      <p class="section-title">Asesor</p>
      <div class="field"><label>Asesor</label><input name="asesor" placeholder="Nombre del asesor"></div>
      <div class="field"><label>Cod. asesor</label><input name="cod_asesor" placeholder="COD"></div>
      <div class="field"><label>Supervisor</label><input name="supervisor" placeholder="Nombre del supervisor"></div>
    `
  },
  'cambio-producto': {
    title: 'Formato de Cambio de Producto',
    fields: `
      <p class="section-title">Fecha</p>
      <div class="field"><label>Día</label><input name="dia" placeholder="01" maxlength="2"></div>
      <div class="field"><label>Mes</label><input name="mes" placeholder="Enero"></div>
      <div class="field"><label>Año</label><input name="anio" placeholder="2026" maxlength="4"></div>
      <p class="section-title">Datos del cliente</p>
      <div class="field full"><label>Nombre cliente</label><input name="cliente" placeholder="Nombre completo"></div>
      <div class="field"><label>C.C.</label><input name="cc" placeholder="123456789"></div>
      <div class="field"><label>Cuenta contrato</label><input name="cuenta_contrato" placeholder="Número"></div>
      <p class="section-title">Detalle del cambio</p>
      <div class="field"><label>Producto actual (a retirar)</label><input name="producto_actual" placeholder="Nombre del producto"></div>
      <div class="field"><label>Producto nuevo (a entregar)</label><input name="producto_nuevo" placeholder="Nombre del producto"></div>
      <div class="field full"><label>Motivo del cambio</label><textarea name="motivo" placeholder="Describa el motivo del cambio..."></textarea></div>
      <p class="section-title">Quien entrega</p>
      <div class="field"><label>Nombre quien entrega</label><input name="nombre_entrega" placeholder="Nombre"></div>
      <div class="field"><label>C.C. quien entrega</label><input name="cc_entrega" placeholder="123456789"></div>
    `
  }
};

function renderForm(docType) {
  const f = FORMS[docType];
  zone.innerHTML = `
    <h2>${f.title}</h2>
    <form id="doc-form">
      <div class="form-grid">${f.fields}</div>
      <button type="submit" class="btn-submit">
        <div class="spinner"></div>
        <span class="btn-text">⬇ Generar y descargar PDF</span>
      </button>
    </form>
  `;
  document.getElementById('doc-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('.btn-submit');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.querySelector('.btn-text').textContent = 'Generando PDF...';
    const data = Object.fromEntries(new FormData(e.target).entries());
    try {
      const res = await fetch(`/generate/${docType}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (!res.ok) {
        const err = await res.text();
        throw new Error(err);
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${docType}.pdf`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('✅ PDF generado y descargado correctamente');
    } catch (err) {
      console.error(err);
      showToast('❌ Error al generar el PDF. Revisa la configuración.', true);
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.querySelector('.btn-text').textContent = '⬇ Generar y descargar PDF';
    }
  });
}

cards.forEach(card => {
  card.addEventListener('click', () => {
    cards.forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    renderForm(card.dataset.doc);
  });
});

renderForm('acta-entrega');
</script>
</body>
</html>
